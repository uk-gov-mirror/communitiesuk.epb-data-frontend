  accessibility_statement:
    top_heading: "Accessibility statement"
    intro: "This statement applies to content published on:"
    service_link: "get-energy-performance-data.communities.gov.uk/"
    paragraph_1:
      text: "This website is run by the Ministry of Housing, Communities and Local Government. We want as many people as possible to be able to use this website. For example, that means you should be able to:"
      list:
        bullet_point_1: "change colours, contrast levels and fonts"
        bullet_point_2: "zoom in up to 300% without the text spilling off the screen"
        bullet_point_3: "navigate most of the website using just a keyboard"
        bullet_point_4: "navigate most of the website using speech recognition software"
        bullet_point_5: "listen to most of the website using a screen reader (including the most recent versions of JAWS, NVDA and VoiceOver)"
    paragraph_2: "We’ve also made the website text as simple as possible to understand."
    paragraph_3:
      text_before_link: ""
      link_text: "AbilityNet"
      link_url:  "https://mcmw.abilitynet.org.uk/"
      text_after_link: "has advice on making your device easier to use if you have a disability."
    contact_heading: "Feedback and contact information"
    contact_paragraph:
      text: "If you need information on this website in a different format like accessible PDF, large print, easy read, audio recording or braille:"
      contact_list:
        email_label: "Email:"
        email_address: "mhclg.digital-services@communities.gov.uk"
        email_subject: "EPB"
        telephone: "Telephone: 020 3829 0748"
    reporting_heading: "Reporting accessibility problems with this website"
    reporting_paragraph_before_link: "We’re always looking to improve the accessibility of this website. If you find any problems not listed on this page or think we’re not meeting accessibility requirements please"
    reporting_paragraph_link_text: "give feedback"
    enforcement_heading: "Enforcement procedure"
    enforcement_paragraph: "The Equality and Human Rights Commission (EHRC) is responsible for enforcing the Public Sector Bodies (Websites and Mobile Applications) (No. 2) Accessibility Regulations 2018 (the ‘accessibility regulations’). If you’re not happy with how we respond to your complaint, <a class=\"govuk-link\" href=\"https://www.equalityadvisoryservice.com/\">contact the Equality Advisory and Support Service (EASS)</a>."
    technical_heading: "Technical information about this website’s accessibility"
    technical_paragraph: "The Ministry of Housing, Communities and Local Government is committed to making its website accessible, in accordance with the Public Sector Bodies (Websites and Mobile Applications) (No. 2) Accessibility Regulations 2018."
    compliance_heading: "Compliance status"
    compliance_paragraph: "This website is partially compliant with the <a class=\"govuk-link\" href=\"https://www.w3.org/TR/WCAG21/\">Web Content Accessibility Guidelines version 2.1 AA standard</a>, due to the non-compliances listed below."
    non_accessible_heading: "Non-accessible content"
    non_accessible_paragraph: "The content listed below is non-accessible for the following reasons."
    non_compliance_heading: "Non-compliance with the accessibility regulations"
    non_compliance_paragraph_1: "Some content comes from accredited assessors. This may be incorrectly structured for the web and difficult to browse with a screen reader, most notably on the Air Conditioning Inspection Reports."
    out_of_scope_heading: "Content that’s not within the scope of the accessibility regulations"
    out_of_scope_paragraph: "Not applicable."
    what_we_do_heading: "What we’re doing to improve accessibility"
    what_we_do_paragraph_1: "This website is due to be tested this year by the Digital Accessibility Centre (DAC), an independent accessibility audit company. We will continue to monitor the accessibility of our services. We will update this page when we find and fix any further issues."
    preparation_heading: "Preparation of this accessibility statement"
    preparation_paragraph: "This statement was prepared on 24 March 2026."
    accessibility_audit: "This website was last tested on 3 January 2023. The test was carried out by the Digital Accessibility Centre (DAC), an independent accessibility audit company. They tested a range of journeys through the service. The team included disabled testers."

